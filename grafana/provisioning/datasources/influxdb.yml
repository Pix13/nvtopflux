apiVersion: 1

datasources:
  - name: InfluxDB-nvtop
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    jsonData:
      version: Flux
      organization: gpu-monitoring
      defaultBucket: nvtop
      tlsSkipVerify: true
    secureJsonData:
      token: ${INFLUXDB_TOKEN}
    editable: true
